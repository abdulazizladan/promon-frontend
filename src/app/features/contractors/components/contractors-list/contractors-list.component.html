<mat-toolbar style="min-height: 40px !important; height: 30px !important;">
  <mat-toolbar-row>
    <span fxFlex="1 1 auto"></span>
    <button mat-flat-button color="accent" (click)="openDialog()">
      <mat-icon>add</mat-icon>
      Add contractor
    </button>
  </mat-toolbar-row>
</mat-toolbar>

<div fxLayout="row" fxLayoutAlign="center">
  <span fxFlex="100%"></span>

  <table fxFlex.gt-xs="1000px" mat-table [dataSource]="contractors" class="mat-elevation-z8">

    <ng-container matColumnDef="sno">
      <th mat-header-cell *matHeaderCellDef> S.no </th>
      <td mat-cell *matCellDef="let i = index"> {{i+1}} </td>
    </ng-container>

    <ng-container matColumnDef="expandedDetail">
      <td mat-cell *matCellDef="let contractor" [attr.colspan]="displayedColumns.length">
        <div class="example-element-detail"
             [@detailExpand]="contractor == expandedContractor ? 'expanded' : 'collapsed'">
          <div>
            <div> {{contractor.website}} </div>
          </div>
          <div class="example-element-description">
            {{contractor.name}}
            <span> -- Wikipedia </span>
          </div>
        </div>
      </td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Contractor </th>
      <td mat-cell *matCellDef="let contractor"> {{contractor.name}} </td>
    </ng-container>

    <ng-container matColumnDef="website">
      <th mat-header-cell *matHeaderCellDef> Website </th>
      <td mat-cell *matCellDef="let contractor"> {{contractor.website}} </td>
    </ng-container>

    <ng-container matColumnDef="rcNumber">
      <th mat-header-cell *matHeaderCellDef> RC Number </th>
      <td mat-cell *matCellDef="let contractor"> {{contractor.rcNumber}} </td>
    </ng-container>

    <ng-container matColumnDef="_id">
      <th mat-header-cell *matHeaderCellDef> Actions</th>
      <td mat-cell *matCellDef="let contractor; let i = index">
        <button mat-icon-button color="primary">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <tr
      mat-row *matRowDef="let contractor; columns: displayedColumns;"
      (click)="expandedContractor = expandedContractor === contractors ? null : contractors">
    </tr>
    <!--<tr mat-row *matRowDef="let contractor; columns: ['expandedDetail']"></tr>-->

  </table>

  <span fxFlex="100%"></span>
</div>
