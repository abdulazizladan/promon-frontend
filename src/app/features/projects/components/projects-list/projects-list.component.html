<mat-toolbar>
  <mat-toolbar-row>
    <mat-form-field fxFlex="1 1 auto" appearance="outline">
      <mat-label>Search</mat-label>
      <input matInput>
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span fxFlex="30px"></span>
    <button mat-flat-button color="accent" (click)="openDialog()">
      <mat-icon>add</mat-icon>
      New project
    </button>
  </mat-toolbar-row>
</mat-toolbar>

<div fxLayout="row" fxLayoutAlign="center">
<span fxFlex="100%"></span>

<table fxFlex.gt-xs="1000px" mat-table [dataSource]="projects" class="mat-elevation-z8">

  <ng-container matColumnDef="title">
    <th mat-header-cell *matHeaderCellDef="let title"> Title</th>
    <td mat-cell *matCellDef="let project"> {{project.title}} </td>
  </ng-container>

  <ng-container matColumnDef="description">
    <th mat-header-cell *matHeaderCellDef ="let description"> Description</th>
    <td mat-cell *matCellDef="let project"> {{project.description}} </td>
  </ng-container>

  <ng-container matColumnDef="location">
    <th mat-header-cell *matHeaderCellDef="let location"> Location</th>
    <td mat-cell *matCellDef="let project"> {{project.state}} </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>

<span fxFlex="100%"></span>

</div>
