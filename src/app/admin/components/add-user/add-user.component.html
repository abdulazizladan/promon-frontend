<h1 mat-dialog-title>New User</h1>
<div fxLayout="column" mat-dialog-content [formGroup]="newUserForm">

  <mat-form-field>
    <mat-label>email</mat-label>
    <input matInput formControlName="email">
    <mat-icon matSuffix>email</mat-icon>
  </mat-form-field>

  <div fxLayout="row" fxLayoutAlign="space-between">

    <mat-form-field>
      <mat-label>First name</mat-label>
      <input matInput formControlName="firstName">
    </mat-form-field>
    <span fxFlex="10px"></span>
    <mat-form-field>
      <mat-label>Last name</mat-label>
      <input matInput formControlName="lastName">
    </mat-form-field>

  </div>

  <div fxLayout="row">
    
    <mat-form-field>
      <mat-label>Password</mat-label>
      <input matInput formControlName="password">
      <mat-icon matSuffix>lock</mat-icon>
    </mat-form-field>
    <span fxFlex="10px"></span>
    <mat-form-field>
      <mat-label>Repeat password</mat-label>
      <input matInput>
      <mat-icon matSuffix>lock</mat-icon>
    </mat-form-field>
  </div>

  <div fxLayout="row">
    <mat-form-field fxFlex="50%">
      <mat-label>User type</mat-label>
      <mat-select formControlName="role">
        <mat-option value="contractor">contractor</mat-option>
        <mat-option value="supervisor">Supervisor</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

</div>

<mat-dialog-actions align="end">
  <button [disabled]="newUserForm.invalid" (click)="submit()" mat-flat-button color="primary">Submit</button>
</mat-dialog-actions>
