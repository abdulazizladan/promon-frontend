<h1 mat-dialog-title>Add new project</h1>
<ng-container>
  <div [formGroup]="addProjectForm" mat-dialog-content fxLayout="column" fxLayoutGap="20px">

    <mat-form-field fxFlex.gt-xs="240px">
      <mat-label>Project title</mat-label>
      <input type="text" matInput formControlName="title">
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Choose a date</mat-label>
      <input matInput [matDatepicker]="picker">
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <mat-form-field fxFlex.gt-xs="1 1 auto">
      <mat-label>Project description</mat-label>
      <textarea style="resize: none;" rows="3" matInput formControlName="description"></textarea>
    </mat-form-field>

    <div fxLayout="row" fxLayoutAlign="space-between">

      <!--<mat-form-field>
        <mat-label>State</mat-label>
        <mat-select>
          <mat-option *ngFor="let state of country.states" value="{{state.name}}">{{state.name | titlecase}}</mat-option>
        </mat-select>
      </mat-form-field>-->

      <!--<mat-form-field>
        <mat-label>LGA</mat-label>
        <mat-select>

        </mat-select>
      </mat-form-field>-->
    </div>

  </div>
</ng-container>

<div mat-dialog-actions align="end" fxLayoutGap="10px">
  <button mat-flat-button color="primary" mat-dialog-close>Close</button>
  <button mat-flat-button color="primary" (click)="submit()">Submit</button>
</div>
