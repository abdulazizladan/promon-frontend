<div class="main" fxLayout="column">
  <mat-toolbar color="primary" style="min-height: 40px !important; height: 30px !important;">
    <mat-toolbar-row>
      <button mat-icon-button (click)="sidenav.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <span fxFlex="1 1"></span>
      <button mat-icon-button [matMenuTriggerFor]="menu">
        <mat-icon>more_vert</mat-icon>
      </button>
      <mat-menu #menu="matMenu">
        <button mat-menu-item>
            <mat-icon>exit_to_app</mat-icon>
            Logout
        </button>
      </mat-menu>
    </mat-toolbar-row>
  </mat-toolbar>
  <mat-sidenav-container fxFlex="1 1 auto" class="sidenav-container">
    <mat-sidenav #sidenav fxLayout="column" color="primary" class="sidenav">
      <button mat-button routerLink="./">Dashboard</button>
      <button mat-button routerLink="./projects">Projects</button>
      <button mat-button routerLink="./contractors">Contractors</button>
      <button mat-button routerLink="./users">Users</button>
    </mat-sidenav>
    <router-outlet></router-outlet>
  </mat-sidenav-container>
</div>
