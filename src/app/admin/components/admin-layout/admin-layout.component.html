<div class="main" fxLayout="column">
  <mat-toolbar color="primary" style="min-height: 45px !important; height: 30px !important;">
    <mat-toolbar-row>
      <button mat-icon-button (click)="sidenav.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <span  class="mat-caption">ProMon</span>
      <span fxFlex="1 1"></span>
      <!--
      <div id="search"  fxLayout="row" fxHide.xs>
        <input type="text" placeholder="search">
        <mat-icon color="primary">search</mat-icon>
      </div>
      -->
      <span fxFlex="20px"></span>
      <span class="mat-caption">Abdulaziz Ladan (Admin) </span>
      <button mat-icon-button>
        <mat-icon>notifications</mat-icon>
      </button>
      <button mat-icon-button [matMenuTriggerFor]="menu">
        <mat-icon>more_vert</mat-icon>
      </button>
      <mat-menu #menu="matMenu" color="primary">
        <button mat-menu-item (click)="signout()">
            <mat-icon>exit_to_app</mat-icon>
            Logout
        </button>
      </mat-menu>
    </mat-toolbar-row>
  </mat-toolbar>
  <mat-sidenav-container fxFlex="1 1 auto" class="sidenav-container">
    <mat-sidenav opened #sidenav fxLayout="column" color="primary" class="sidenav mat-elevation-z6" mode="side">
      <div id="profile-window" fxLayout="column" fxLayoutGap="10px" fxLayoutAlign="center center">
        <div id="profile-pic">

        </div>
        <span class="mat-caption">Agency name</span>
      </div>
      <button mat-raised-button routerLink="./">
        <mat-icon>dashboard</mat-icon>
        &nbsp; Dashboard
      </button>
      <button mat-raised-button routerLink="./projects">
        <mat-icon>business_center</mat-icon>
        &nbsp; Projects
      </button>
      <button color="accent" mat-raised-button routerLink="./contractors">
        <mat-icon>business</mat-icon>
        &nbsp; Contractors
      </button>
      <button color="accent" mat-raised-button routerLink="./contracts">
        <mat-icon>work</mat-icon>
        &nbsp; Contracts
      </button>
      <button color="accent" mat-raised-button routerLink="./users">
        <mat-icon>supervisor_account</mat-icon>
        &nbsp; Supervisors
      </button>
      <button color="accent" mat-raised-button routerLink="./mail">
        <mat-icon>mail</mat-icon>
        &nbsp; Message center
      </button>
      <button color="accent" mat-raised-button routerLink="./mail">
        <mat-icon>notifications</mat-icon>
        &nbsp; Notifications
      </button>
    </mat-sidenav>
    <mat-sidenav-content fxLayout="row" fxLayoutAlign="center">
      <div fxFlex.lt-lg="100%" fxFlex.gt-sm="1024px">
        <router-outlet></router-outlet>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
