<div style="height: 100%;" fxLayout="column" fxLayoutGap="10px">
  <mat-toolbar style="min-height: 40px !important; height: 30px !important;">
    <mat-toolbar-row>
      <span fxFlex="1 1 auto"></span>
      <button mat-button color="primary" (click)="openDialog()">
        <mat-icon>add</mat-icon>
        New User
      </button>
    </mat-toolbar-row>
  </mat-toolbar>

  <div fxLayout="row" fxLayoutAlign="center">
    <table fxFlex.gt-xs="1000px" mat-table [dataSource]="users" class="mat-elevation-z8">

      <ng-container matColumnDef="firstName">
        <th mat-header-cell *matHeaderCellDef> First name</th>
        <td mat-cell *matCellDef="let user of users"> {{user.firstName}} </td>
      </ng-container>

      <ng-container matColumnDef="lastName">
        <th mat-header-cell *matHeaderCellDef> Last name</th>
        <td mat-cell *matCellDef="let user of users"> {{user.lastName}} </td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef> Email </th>
        <td mat-cell *matCellDef="let user of users"> {{user.email}} </td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef> Role </th>
        <td mat-cell *matCellDef="let user of users"> {{user.role}} </td>
      </ng-container>

      <ng-container matColumnDef="active">
        <th mat-header-cell *matHeaderCellDef> Acrive</th>
        <td mat-cell *matCellDef="let user of users">
           <mat-slide-toggle checked="{{user.active}}"></mat-slide-toggle>
           
           {{user.active}} 
          </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>
  </div>

</div>
