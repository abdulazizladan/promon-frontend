<mat-toolbar style="min-height: 40px !important; height: 30px !important;">
    <mat-toolbar-row>
      <span fxFlex="1 1 auto"></span>
      <button mat-button color="primary" (click)="openDialog()">
        <mat-icon>add</mat-icon>
        New project
      </button>
    </mat-toolbar-row>
</mat-toolbar>

<div fxLayout="row" fxLayoutAlign="center">
  <span fxFlex="100%"></span>

  <table fxFlex.gt-xs="1000px" mat-table [dataSource]="projects" class="mat-elevation-z8">

    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef> Title</th>
      <td mat-cell *matCellDef="let project of projects"> {{project.title}} </td>
    </ng-container>

    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef> Description</th>
      <td mat-cell *matCellDef="let project of projects"> {{project.description}} </td>
    </ng-container>

    <ng-container matColumnDef="location">
      <th mat-header-cell *matHeaderCellDef> Location</th>
      <td mat-cell *matCellDef="let project of projects"> {{project.location}} </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

  <span fxFlex="100%"></span>
  
</div>
