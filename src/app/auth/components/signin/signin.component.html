<mat-card>
  <mat-toolbar color="primary">
    Signin
  </mat-toolbar>
  <mat-card-content fxLayout="column" [formGroup]="signinForm">

    <mat-form-field>
      <mat-label>
        email
      </mat-label>
      <input matInput type="email" formControlName="email">
      <mat-icon matSuffix>mail</mat-icon>
    </mat-form-field>

    <mat-form-field>
      <mat-label>
        password
      </mat-label>
      <input matInput type="password" formControlName="password">
      <mat-icon matSuffix>lock</mat-icon>
    </mat-form-field>

  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-flat-button color="primary" (click)="signin()">Signin</button>
  </mat-card-actions>
  <mat-card-footer>

  </mat-card-footer>
</mat-card>
