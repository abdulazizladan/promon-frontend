<div fxLayout="row" fxLayoutAlign="center">
  <mat-card fxLayout="column" fxFlex.xs="100%" fxFlex.gt-xs="280px" fxFlexAlign="center">
    <mat-toolbar color="primary">
      Signin
    </mat-toolbar>
    <mat-card-content fxLayout="column" [formGroup]="signinForm" fxFlex="1">

      <mat-form-field appearance="outline">
        <mat-label>
          email
        </mat-label>
        <input matInput type="email" formControlName="email">
        <mat-icon matSuffix color="primary">mail</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>
          password
        </mat-label>
        <input matInput type="password" formControlName="password">
        <mat-icon matSuffix color="primary">lock</mat-icon>
      </mat-form-field>

    </mat-card-content>

    <mat-card-actions align="end" fxFlex="1">
      <button mat-flat-button color="primary" (click)="signin()" [disabled]="signinForm.invalid">Signin</button>
    </mat-card-actions>
    <!--<mat-card-footer fxFlex="1">
      Unable to complete action.
    </mat-card-footer>-->
  </mat-card>
</div>
